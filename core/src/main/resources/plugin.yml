name: Hypixel
main: io.github.mebsic.core.CorePlugin
version: 0.1
commands:
  ban:
    usage: /ban <player> [duration] [reason]
  unban:
    usage: /unban <player>
  mute:
    usage: /mute <player> [duration] [reason]
  bans:
    usage: /bans <player> [page]
  mutes:
    usage: /mutes <player> [page]
  unmute:
    usage: /unmute <player>
  kick:
    usage: /kick <player> [reason]
  rank:
    usage: /rank <player> <rank> [duration]
  rankcolor:
    usage: /rankcolor
  networklevel:
    usage: /networklevel <player> <level>
  gold:
    usage: /gold <player> <amount>
  gift:
    usage: /gift <player>
  unlock100ranksgifted:
    usage: /unlock100ranksgifted
  reset100ranksgifted:
    usage: /reset100ranksgifted
  gamemode:
    usage: /gamemode <mode> [onlinePlayer]
    aliases: [gm]
  give:
    usage: /give [onlinePlayer] <item> <quantity>
  clear:
    usage: /clear [onlinePlayer]
  effect:
    usage: /effect <player/all> <type> <duration|forever> [amount]
  cleareffect:
    usage: /cleareffect <player/all>
  teleport:
    usage: /teleport <player> | /teleport <from> <to> | /teleport <x> <y> <z> | /teleport all
    aliases: [tp]
  fly:
    usage: /fly
  buildmode:
    usage: /buildmode
    aliases: [togglebuildmode]
  firework:
    usage: /firework
    aliases: [fw]
  find:
    usage: /find
  displayendcredits:
    usage: /displayendcredits <player/all>
  parkour:
    usage: /parkour [start|reset|checkpoint|cancel]
  news:
    usage: /news
  help:
    usage: /help [report|general|linking]
  whereami:
    usage: /whereami
  map:
    usage: /map
    aliases: [wtfmap]
